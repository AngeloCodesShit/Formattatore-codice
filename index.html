<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code → PNG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* ── Syntax: Atom One Dark ─────────────────────────────────────────── */
    #export-target.theme-dark  { background: #282c34; }
    #export-target.theme-dark .hljs                  { background: #282c34; color: #abb2bf; }
    #export-target.theme-dark .hljs-keyword,
    #export-target.theme-dark .hljs-selector-tag     { color: #c678dd; }
    #export-target.theme-dark .hljs-title,
    #export-target.theme-dark .hljs-section          { color: #61afef; }
    #export-target.theme-dark .hljs-type             { color: #e5c07b; }
    #export-target.theme-dark .hljs-title.class_,
    #export-target.theme-dark .hljs-class .hljs-title{ color: #e5913a; }
    #export-target.theme-dark .hljs-string,
    #export-target.theme-dark .hljs-attr             { color: #98c379; }
    #export-target.theme-dark .hljs-number,
    #export-target.theme-dark .hljs-literal          { color: #d19a66; }
    #export-target.theme-dark .hljs-comment          { color: #5c6370; font-style: italic; }
    #export-target.theme-dark .hljs-built_in,
    #export-target.theme-dark .hljs-name             { color: #e5c07b; }
    #export-target.theme-dark .hljs-operator,
    #export-target.theme-dark .hljs-punctuation      { color: #56b6c2; }
    #export-target.theme-dark .hljs-variable,
    #export-target.theme-dark .hljs-params           { color: #e06c75; }
    #export-target.theme-dark .hljs-tag              { color: #e06c75; }

    /* ── Syntax: Atom One Light ────────────────────────────────────────── */
    #export-target.theme-light  { background: #f0f4f9; }
    #export-target.theme-light .hljs                  { background: #f0f4f9; color: #383a42; }
    #export-target.theme-light .hljs-keyword,
    #export-target.theme-light .hljs-selector-tag     { color: #a626a4; }
    #export-target.theme-light .hljs-title,
    #export-target.theme-light .hljs-section          { color: #4078f2; }
    #export-target.theme-light .hljs-type             { color: #c18401; }
    #export-target.theme-light .hljs-title.class_,
    #export-target.theme-light .hljs-class .hljs-title{ color: #d06000; }
    #export-target.theme-light .hljs-string,
    #export-target.theme-light .hljs-attr             { color: #50a14f; }
    #export-target.theme-light .hljs-number,
    #export-target.theme-light .hljs-literal          { color: #986801; }
    #export-target.theme-light .hljs-comment          { color: #a0a1a7; font-style: italic; }
    #export-target.theme-light .hljs-built_in,
    #export-target.theme-light .hljs-name             { color: #c18401; }
    #export-target.theme-light .hljs-operator,
    #export-target.theme-light .hljs-punctuation      { color: #0184bc; }
    #export-target.theme-light .hljs-variable,
    #export-target.theme-light .hljs-params           { color: #e45649; }
    #export-target.theme-light .hljs-tag              { color: #e45649; }

    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --app-bg:     #1e1e2e;
      --panel-bg:   #282c34;
      --fg:         #abb2bf;
      --fg-dim:     #666;
      --border:     #3e4451;
      --accent:     #5865f2;
      --accent-hov: #4752c4;
      --sel:        #3e4451;
      --radius:     10px;
      /* valori live aggiornati dagli slider */
      --code-font-size:   14px;
      --code-line-height: 1.65;
      --code-padding:     26px;
    }

    html, body { min-width: 720px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--app-bg);
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      padding: 13px 22px 8px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 19px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.3px;
    }

    /* ── Toolbar principale ─────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 22px 8px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: visible;
    }
    .toolbar label { font-size: 12px; color: var(--fg-dim); }

    select {
      background: var(--panel-bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    /* Toggle generico (Tema / Formato) */
    .toggle-group {
      display: flex;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-group button {
      background: transparent;
      color: var(--fg-dim);
      border: none;
      padding: 5px 11px;
      font-size: 12px;
      cursor: pointer;
      transition: background .13s, color .13s;
    }
    .toggle-group button.active { background: var(--accent); color: #fff; }

    #copy-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 7px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .13s, transform .1s;
      white-space: nowrap;
    }
    #copy-btn:hover  { background: var(--accent-hov); }
    #copy-btn:active { transform: scale(.97); }

    /* ── Barra slider ───────────────────────────────────────────────────── */
    .sliders {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 22px 10px;
      flex-shrink: 0;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .slider-group label {
      font-size: 12px;
      color: var(--fg-dim);
      white-space: nowrap;
    }
    .slider-group .val {
      font-size: 12px;
      color: var(--fg);
      min-width: 34px;
      font-variant-numeric: tabular-nums;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 90px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: background .13s;
    }
    input[type=range]::-webkit-slider-thumb:hover { background: var(--accent-hov); }

    /* ── Pannelli ───────────────────────────────────────────────────────── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 0 22px 18px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      background: var(--panel-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--fg-dim);
      padding: 8px 14px 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Textarea input */
    #code-input {
      flex: 1;
      background: transparent;
      color: var(--fg);
      border: none;
      outline: none;
      resize: none;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', 'Menlo', 'Courier New', monospace;
      font-size: 13.5px;
      line-height: 1.65;
      caret-color: var(--fg);
      tab-size: 4;
      white-space: pre;        /* no word-wrap */
      overflow: auto;
    }
    #code-input::selection { background: var(--sel); }

    /* Preview scroll — scorre, non stringe */
    .preview-scroll {
      flex: 1;
      overflow: auto;
      padding: 6px;
    }

    /* Export target — si allarga col contenuto, non viene forzato */
    #export-target {
      display: inline-block;   /* larghezza = contenuto */
      white-space: nowrap;     /* niente a-capo forzato */
      min-width: calc(100% - 12px);
    }

    #export-target pre {
      margin: 0;
      padding: var(--code-padding);
    }

    #export-target pre code {
      font-family: 'JetBrains Mono', 'Menlo', 'Courier New', monospace !important;
      font-size: var(--code-font-size) !important;
      line-height: var(--code-line-height) !important;
      background: transparent !important;
      padding: 0 !important;
      white-space: pre;        /* mantieni spacing originale */
      tab-size: 4;
    }

    /* ── Tema Chiaro ────────────────────────────────────────────────────── */
    body.light {
      --app-bg:   #f0f0f5;
      --panel-bg: #f0f4f9;
      --fg:       #383a42;
      --fg-dim:   #777;
      --border:   #d8d8e0;
      --sel:      #d0d0e0;
    }
    body.light header h1   { color: #1a1a2e; }
    body.light #code-input { color: #383a42; }
    body.light select      { color: #383a42; }
  </style>
</head>
<body>

  <header><h1>Code &nbsp;→&nbsp; PNG</h1></header>

  <!-- Toolbar principale -->
  <div class="toolbar">
    <label>Linguaggio</label>
    <select id="lang-select">
      <option value="auto">Auto-detect</option>
      <option value="java" selected>Java</option>
      <option value="python">Python</option>
      <option value="javascript">JavaScript</option>
      <option value="typescript">TypeScript</option>
      <option value="kotlin">Kotlin</option>
      <option value="swift">Swift</option>
      <option value="cpp">C++</option>
      <option value="cs">C#</option>
      <option value="go">Go</option>
      <option value="rust">Rust</option>
      <option value="sql">SQL</option>
      <option value="json">JSON</option>
      <option value="xml">XML</option>
      <option value="bash">Bash</option>
      <option value="html">HTML</option>
      <option value="css">CSS</option>
    </select>

    <label style="margin-left:6px">Tema</label>
    <div class="toggle-group">
      <button id="btn-dark"  onclick="setTheme('dark')"  class="active">Scuro</button>
      <button id="btn-light" onclick="setTheme('light')">Chiaro</button>
    </div>

    <label style="margin-left:6px">Formato</label>
    <div class="toggle-group">
      <button id="fmt-png"  onclick="setFormat('png')"  class="active">PNG</button>
      <button id="fmt-jpeg" onclick="setFormat('jpeg')">JPEG</button>
    </div>

  </div>

  <!-- Barra slider + bottone copia -->
  <div class="sliders">
    <div class="slider-group">
      <label>Font</label>
      <input type="range" id="sl-font" min="10" max="22" step="1" value="14"
             oninput="applySliders()">
      <span class="val" id="val-font">14px</span>
    </div>
    <div class="slider-group">
      <label>Padding</label>
      <input type="range" id="sl-pad" min="8" max="60" step="2" value="26"
             oninput="applySliders()">
      <span class="val" id="val-pad">26px</span>
    </div>
    <div class="slider-group">
      <label>Interlinea</label>
      <input type="range" id="sl-line" min="100" max="250" step="5" value="165"
             oninput="applySliders()">
      <span class="val" id="val-line">1.65</span>
    </div>
    <span id="status" style="flex:1; font-size:12px; color:var(--fg-dim); text-align:center;"></span>
    <button id="copy-btn" onclick="copyImage()">Copia come PNG</button>
  </div>

  <!-- Pannelli -->
  <div class="panels">
    <div class="panel">
      <div class="panel-label">Codice</div>
      <textarea id="code-input" spellcheck="false" wrap="off">List&lt;Persona&gt; amici = Arrays.asList(
    new Persona("Saro", 24), new Persona("Taro", 21),
    new Persona("Ian", 19), new Persona("Al", 16));

int somma = amici.stream()
                .map(Persona::getEta)
                .reduce(0, Integer::sum);</textarea>
    </div>

    <div class="panel">
      <div class="panel-label">Anteprima</div>
      <div class="preview-scroll">
        <div id="export-target" class="theme-dark">
          <pre><code id="preview-code"></code></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const input        = document.getElementById('code-input');
    const langSelect   = document.getElementById('lang-select');
    const previewCode  = document.getElementById('preview-code');
    const exportTarget = document.getElementById('export-target');
    const statusEl     = document.getElementById('status');

    let currentTheme  = 'dark';
    let currentFormat = 'png';

    const BG = { dark: '#282c34', light: '#f0f4f9' };

    // ── Tema ──────────────────────────────────────────────────────────────
    function setTheme(t) {
      currentTheme = t;
      document.body.classList.toggle('light', t === 'light');
      exportTarget.className = 'theme-' + t;
      document.getElementById('btn-dark').classList.toggle('active',  t === 'dark');
      document.getElementById('btn-light').classList.toggle('active', t === 'light');
      updatePreview();
    }

    // ── Formato ───────────────────────────────────────────────────────────
    function setFormat(f) {
      currentFormat = f;
      document.getElementById('fmt-png').classList.toggle('active',  f === 'png');
      document.getElementById('fmt-jpeg').classList.toggle('active', f === 'jpeg');
      document.getElementById('copy-btn').textContent =
        'Copia come ' + f.toUpperCase();
    }

    // ── Slider ────────────────────────────────────────────────────────────
    function applySliders() {
      const fs   = document.getElementById('sl-font').value;
      const pad  = document.getElementById('sl-pad').value;
      const line = document.getElementById('sl-line').value;

      document.documentElement.style.setProperty('--code-font-size',   fs + 'px');
      document.documentElement.style.setProperty('--code-padding',     pad + 'px');
      document.documentElement.style.setProperty('--code-line-height', (line / 100).toFixed(2));

      document.getElementById('val-font').textContent = fs + 'px';
      document.getElementById('val-pad').textContent  = pad + 'px';
      document.getElementById('val-line').textContent = (line / 100).toFixed(2);
    }

    // ── Preview ───────────────────────────────────────────────────────────
    function updatePreview() {
      const code = input.value;
      const lang = langSelect.value;
      let out;
      if (lang === 'auto') {
        out = hljs.highlightAuto(code).value;
      } else {
        try {
          out = hljs.highlight(code, { language: lang, ignoreIllegals: true }).value;
        } catch (_) {
          out = hljs.highlightAuto(code).value;
        }
      }
      previewCode.innerHTML = out;
    }

    input.addEventListener('input', updatePreview);
    langSelect.addEventListener('change', updatePreview);

    // ── Copia / Download ──────────────────────────────────────────────────
    async function copyImage() {
      setStatus('Generazione…', '#888');
      try {
        await document.fonts.ready;

        const bg = BG[currentTheme];
        const canvas = await html2canvas(exportTarget, {
          backgroundColor: bg,
          scale: 2,
          useCORS: true,
          logging: false,
        });

        const mimeType = currentFormat === 'jpeg' ? 'image/jpeg' : 'image/png';
        const ext      = currentFormat === 'jpeg' ? 'jpeg' : 'png';

        canvas.toBlob(async (blob) => {
          if (navigator.clipboard && navigator.clipboard.write) {
            try {
              // la clipboard di sistema accetta solo image/png
              const clipBlob = currentFormat === 'png'
                ? blob
                : await convertTopng(canvas);
              await navigator.clipboard.write([
                new ClipboardItem({ 'image/png': clipBlob })
              ]);
              setStatus('✓ Copiato negli appunti!', '#50a14f');
              return;
            } catch (_) {}
          }
          // fallback: download
          downloadBlob(blob, 'codice.' + ext);
          setStatus('Scaricato come codice.' + ext, '#986801');
        }, mimeType, 0.92);

      } catch (err) {
        setStatus('Errore: ' + err.message, '#e45649');
      }
      setTimeout(() => setStatus('', '#888'), 4000);
    }

    function convertTopng(canvas) {
      return new Promise(resolve =>
        canvas.toBlob(resolve, 'image/png')
      );
    }

    function downloadBlob(blob, name) {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href = url; a.download = name; a.click();
      URL.revokeObjectURL(url);
    }

    function setStatus(msg, color) {
      statusEl.textContent = msg;
      statusEl.style.color = color;
    }

    // ── Init ──────────────────────────────────────────────────────────────
    setTheme('dark');
    setFormat('png');
    applySliders();
    updatePreview();
  </script>
</body>
</html>
