<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code → PNG</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- highlight.js base (nessun tema CDN — usiamo CSS inline per entrambi i temi) -->
  <style>
    /* ── Atom One Dark ── */
    #export-target.theme-dark  { background: #282c34; }
    #export-target.theme-dark .hljs                { background: #282c34; color: #abb2bf; }
    #export-target.theme-dark .hljs-keyword,
    #export-target.theme-dark .hljs-selector-tag  { color: #c678dd; }
    #export-target.theme-dark .hljs-title,
    #export-target.theme-dark .hljs-section        { color: #61afef; }
    #export-target.theme-dark .hljs-type,
    #export-target.theme-dark .hljs-class .hljs-title { color: #e5c07b; }
    #export-target.theme-dark .hljs-string,
    #export-target.theme-dark .hljs-attr           { color: #98c379; }
    #export-target.theme-dark .hljs-number,
    #export-target.theme-dark .hljs-literal        { color: #d19a66; }
    #export-target.theme-dark .hljs-comment        { color: #5c6370; font-style: italic; }
    #export-target.theme-dark .hljs-built_in,
    #export-target.theme-dark .hljs-name           { color: #e5c07b; }
    #export-target.theme-dark .hljs-operator,
    #export-target.theme-dark .hljs-punctuation    { color: #56b6c2; }
    #export-target.theme-dark .hljs-variable,
    #export-target.theme-dark .hljs-params         { color: #e06c75; }
    #export-target.theme-dark .hljs-tag            { color: #e06c75; }

    /* ── Atom One Light ── */
    #export-target.theme-light  { background: #f0f4f9; }
    #export-target.theme-light .hljs                { background: #f0f4f9; color: #383a42; }
    #export-target.theme-light .hljs-keyword,
    #export-target.theme-light .hljs-selector-tag  { color: #a626a4; }
    #export-target.theme-light .hljs-title,
    #export-target.theme-light .hljs-section        { color: #4078f2; }
    #export-target.theme-light .hljs-type,
    #export-target.theme-light .hljs-class .hljs-title { color: #c18401; }
    #export-target.theme-light .hljs-string,
    #export-target.theme-light .hljs-attr           { color: #50a14f; }
    #export-target.theme-light .hljs-number,
    #export-target.theme-light .hljs-literal        { color: #986801; }
    #export-target.theme-light .hljs-comment        { color: #a0a1a7; font-style: italic; }
    #export-target.theme-light .hljs-built_in,
    #export-target.theme-light .hljs-name           { color: #c18401; }
    #export-target.theme-light .hljs-operator,
    #export-target.theme-light .hljs-punctuation    { color: #0184bc; }
    #export-target.theme-light .hljs-variable,
    #export-target.theme-light .hljs-params         { color: #e45649; }
    #export-target.theme-light .hljs-tag            { color: #e45649; }
  </style>

  <!-- highlight.js + html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --app-bg:      #1e1e2e;
      --panel-bg:    #282c34;
      --fg:          #abb2bf;
      --fg-dim:      #888;
      --border:      #3e4451;
      --accent:      #5865f2;
      --accent-hov:  #4752c4;
      --sel:         #3e4451;
      --preview-bg:  #282c34;
      --radius:      10px;
    }

    html, body {
      min-width: 700px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--app-bg);
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 14px 22px 10px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.3px;
    }

    /* ── Toolbar ───────────────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 22px 10px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .toolbar label {
      font-size: 13px;
      color: var(--fg-dim);
    }

    select {
      background: var(--panel-bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    /* Tema toggle */
    .theme-toggle {
      display: flex;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .theme-toggle button {
      background: transparent;
      color: var(--fg-dim);
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .theme-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    /* Bottone copia */
    #copy-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    #copy-btn:hover  { background: var(--accent-hov); }
    #copy-btn:active { transform: scale(.97); }

    #status {
      font-size: 12px;
      color: var(--fg-dim);
      flex: 1;
      text-align: center;
    }

    /* ── Pannelli ──────────────────────────────────────────────────────── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 0 22px 18px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      background: var(--panel-bg);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .panel-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--fg-dim);
      padding: 9px 14px 7px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Textarea input */
    #code-input {
      flex: 1;
      background: transparent;
      color: var(--fg);
      border: none;
      outline: none;
      resize: none;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', 'Menlo', 'Courier New', monospace;
      font-size: 13.5px;
      line-height: 1.65;
      caret-color: var(--fg);
    }
    #code-input::selection { background: var(--sel); }

    /* Preview */
    .preview-scroll {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      padding: 4px;
    }

    /* Il div che viene esportato come PNG */
    #export-target {
      background: var(--preview-bg);
      padding: 26px 30px;
      display: inline-block;
      min-width: 100%;
    }

    #export-target pre {
      margin: 0;
    }

    #export-target pre code {
      font-family: 'JetBrains Mono', 'Menlo', 'Courier New', monospace !important;
      font-size: 14px !important;
      line-height: 1.65 !important;
      background: transparent !important;
      padding: 0 !important;
    }

    /* ── Tema Chiaro: override variabili ───────────────────────────────── */
    body.light {
      --app-bg:     #f0f0f5;
      --panel-bg:   #f0f4f9;
      --fg:         #383a42;
      --fg-dim:     #777;
      --border:     #d8d8e0;
      --sel:        #d0d0e0;
      --preview-bg: #f0f4f9;
    }
    body.light header h1      { color: #1a1a2e; }
    body.light #code-input    { color: #383a42; }
    body.light select         { color: #383a42; }
  </style>
</head>
<body>

  <header>
    <h1>Code &nbsp;→&nbsp; PNG</h1>
  </header>

  <div class="toolbar">
    <label>Linguaggio</label>
    <select id="lang-select">
      <option value="auto">Auto-detect</option>
      <option value="java" selected>Java</option>
      <option value="python">Python</option>
      <option value="javascript">JavaScript</option>
      <option value="typescript">TypeScript</option>
      <option value="kotlin">Kotlin</option>
      <option value="swift">Swift</option>
      <option value="cpp">C++</option>
      <option value="cs">C#</option>
      <option value="go">Go</option>
      <option value="rust">Rust</option>
      <option value="sql">SQL</option>
      <option value="json">JSON</option>
      <option value="xml">XML</option>
      <option value="bash">Bash</option>
      <option value="html">HTML</option>
      <option value="css">CSS</option>
    </select>

    <label style="margin-left:6px">Tema</label>
    <div class="theme-toggle">
      <button id="btn-dark"  class="active" onclick="setTheme('dark')">Scuro</button>
      <button id="btn-light"             onclick="setTheme('light')">Chiaro</button>
    </div>

    <span id="status"></span>
    <button id="copy-btn" onclick="copyAsPng()">Copia come PNG</button>
  </div>

  <div class="panels">
    <!-- Input -->
    <div class="panel">
      <div class="panel-label">Codice</div>
      <textarea id="code-input" spellcheck="false">List&lt;Persona&gt; amici = Arrays.asList(
    new Persona("Saro", 24), new Persona("Taro", 21),
    new Persona("Ian", 19), new Persona("Al", 16));

int somma = amici.stream()
                .map(Persona::getEta)
                .reduce(0, Integer::sum);</textarea>
    </div>

    <!-- Preview / export -->
    <div class="panel">
      <div class="panel-label">Anteprima PNG</div>
      <div class="preview-scroll">
        <div id="export-target">
          <pre><code id="preview-code"></code></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const input       = document.getElementById('code-input');
    const langSelect  = document.getElementById('lang-select');
    const previewCode = document.getElementById('preview-code');
    const exportTarget= document.getElementById('export-target');
    const statusEl    = document.getElementById('status');

    let currentTheme = 'dark';

    // ── Tema ──────────────────────────────────────────────────────────────
    function setTheme(theme) {
      currentTheme = theme;
      document.body.classList.toggle('light', theme === 'light');
      exportTarget.classList.toggle('theme-dark',  theme === 'dark');
      exportTarget.classList.toggle('theme-light', theme === 'light');
      document.getElementById('btn-dark').classList.toggle('active',  theme === 'dark');
      document.getElementById('btn-light').classList.toggle('active', theme === 'light');
      updatePreview();
    }

    // ── Preview ───────────────────────────────────────────────────────────
    function updatePreview() {
      const code = input.value;
      const lang = langSelect.value;

      let highlighted;
      if (lang === 'auto') {
        highlighted = hljs.highlightAuto(code).value;
      } else {
        try {
          highlighted = hljs.highlight(code, { language: lang }).value;
        } catch (_) {
          highlighted = hljs.highlightAuto(code).value;
        }
      }
      previewCode.innerHTML = highlighted;
    }

    input.addEventListener('input', updatePreview);
    langSelect.addEventListener('change', updatePreview);

    // Init dark theme
    setTheme('dark');
    updatePreview();

    // ── Copia come PNG ────────────────────────────────────────────────────
    async function copyAsPng() {
      setStatus('Generazione…', '#888');

      try {
        await document.fonts.ready;

        const canvas = await html2canvas(exportTarget, {
          backgroundColor: currentTheme === 'dark' ? '#282c34' : '#f0f4f9',
          scale: 2,
          useCORS: true,
          logging: false,
        });

        canvas.toBlob(async (blob) => {
          // Prova clipboard API (richiede HTTPS o localhost)
          if (navigator.clipboard && navigator.clipboard.write) {
            try {
              await navigator.clipboard.write([
                new ClipboardItem({ 'image/png': blob })
              ]);
              setStatus('✓ PNG copiato negli appunti!', '#50a14f');
              return;
            } catch (_) {
              // fallback → download
            }
          }
          // Fallback: scarica il file
          downloadBlob(blob);
          setStatus('PNG scaricato (apri su localhost per la clipboard)', '#986801');
        }, 'image/png');

      } catch (err) {
        setStatus('Errore: ' + err.message, '#e45649');
      }

      setTimeout(() => setStatus('', '#888'), 4000);
    }

    function downloadBlob(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'codice.png';
      a.click();
      URL.revokeObjectURL(url);
    }

    function setStatus(msg, color) {
      statusEl.textContent = msg;
      statusEl.style.color = color;
    }
  </script>
</body>
</html>
